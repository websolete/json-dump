name: Publish Extension

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify publish secret
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [[ -z "$VSCE_PAT" ]]; then
            echo "VSCE_PAT secret is not configured." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package:vsix

      - name: Locate VSIX
        id: vsix
        shell: bash
        run: |
          set -euo pipefail
          vsix_path="$(find . -maxdepth 1 -type f -name 'json-dump-*.vsix' | head -n 1)"
          if [[ -z "$vsix_path" ]]; then
            echo "VSIX package was not created." >&2
            exit 1
          fi

          echo "path=$vsix_path" >> "$GITHUB_OUTPUT"

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "${{ steps.vsix.outputs.path }}" --pat "$VSCE_PAT" --skip-duplicate

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: json-dump-vsix
          path: ${{ steps.vsix.outputs.path }}

      - name: Upload VSIX to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.vsix.outputs.path }}" --clobber